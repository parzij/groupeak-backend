repos:
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -lc 'cd backend-app && gofmt -w .'
        language: system
        types: [go]

      - id: go-vet
        name: go vet
        entry: bash -lc 'cd backend-app && go vet ./...'
        language: system
        pass_filenames: false

      - id: go-unit-tests
        name: go test
        entry: bash -lc 'cd backend-app && go test ./...'
        language: system
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy
        entry: bash -lc 'cd backend-app && go mod tidy'
        language: system
        pass_filenames: false

      - id: python-api-tests
        name: python api tests
        entry: bash -lc 'cd ../groupeak_pytests && export GROUPEAK_BASE_URL=http://127.0.0.1:3030 && .venv/bin/python -m pytest -v'
        language: system
        pass_filenames: false